<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="展示航走後のAI直前予測をリアルタイム更新。朝の予想からの評価変化も表示。">
<title>ライブ直前予測 — BoatAI</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.live-head{padding:28px 16px 12px;text-align:center;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.live-head h1{font-size:clamp(20px,5vw,30px);margin:6px 0;}
.live-head .upd{color:var(--muted);font-size:12px;}
.live-head .backlink{font-size:13px;}
.lrace{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin:12px 0;}
.lrace .rh{display:flex;flex-wrap:wrap;gap:10px;align-items:baseline;margin-bottom:6px;}
.lrace .rh .v{font-weight:bold;font-size:16px;}
.lrace .rh .dl{color:var(--accent);font-variant-numeric:tabular-nums;}
.lrace .comment{font-size:12px;color:#ffb74d;background:rgba(255,183,77,.08);
  border:1px solid rgba(255,183,77,.3);border-radius:6px;padding:4px 8px;margin:4px 0;}
table.ltab{border-collapse:collapse;width:100%;margin-top:4px;}
table.ltab th,table.ltab td{padding:3px 6px;font-size:12px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums;}
table.ltab th{color:var(--muted);font-weight:normal;}
.laneb{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;
  border-radius:4px;font-weight:bold;font-size:12px;border:1px solid rgba(255,255,255,.25);}
.up{color:#66bb6a;} .down{color:#ef5350;} .flat{color:var(--muted);}
details.tri{margin-top:6px;}
details.tri summary{font-size:12px;color:var(--muted);cursor:pointer;}
.combos-live{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.combos-live span{background:rgba(79,195,247,.08);border:1px solid var(--border);
  border-radius:6px;padding:2px 8px;font-size:12px;font-variant-numeric:tabular-nums;}
.empty{background:var(--card);border:1px dashed var(--border);border-radius:10px;
  padding:24px;text-align:center;color:var(--muted);margin:24px 0;}
</style>
</head>
<body>

<header class="live-head">
  <h1>ライブ直前予測 <span class="brand">BoatAI</span></h1>
  <p class="upd">展示航走後の直前情報でAIが予測を更新します (約30秒ごとに自動再読込) <span id="updated"></span></p>
  <p class="backlink"><a href="index.html">← トップへ戻る</a></p>
</header>

<main>
  <section class="section" id="live-root">
    <div class="empty">読み込み中…</div>
  </section>
</main>

<footer class="footer">
  <div class="footer-inner">
    <p class="disclaimer-f">本サイトは機械学習による予想の参考情報です。的中を保証するものではありません。舟券の購入は自己責任でお願いします。<strong>20歳未満の方の舟券購入は法律で禁止されています。</strong></p>
    <p class="copy">BoatAI — AI Boatrace Prediction</p>
  </div>
</footer>

<script>
(function(){
  var LANE_BG = {1:"#f5f5f5",2:"#333333",3:"#e53935",4:"#1e88e5",5:"#fdd835",6:"#43a047"};
  var LANE_FG = {1:"#333",2:"#fff",3:"#fff",4:"#fff",5:"#333",6:"#fff"};
  var VENUES = {"01":"桐生","02":"戸田","03":"江戸川","04":"平和島","05":"多摩川",
    "06":"浜名湖","07":"蒲郡","08":"常滑","09":"津","10":"三国","11":"びわこ",
    "12":"住之江","13":"尼崎","14":"鳴門","15":"丸亀","16":"児島","17":"宮島",
    "18":"徳山","19":"下関","20":"若松","21":"芦屋","22":"福岡","23":"唐津","24":"大村"};

  function todayStr(){
    var d = new Date();
    return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0")
           + String(d.getDate()).padStart(2,"0");
  }
  function pct(p){ return (p*100).toFixed(1) + "%"; }
  function esc(s){ var e=document.createElement("span"); e.textContent=String(s); return e.innerHTML; }

  function arrow(now, morn){
    if (morn == null) return '<span class="flat">-</span>';
    var d = (now - morn) * 100;
    if (d >= 1)  return '<span class="up">&#9650;+' + d.toFixed(1) + 'pt</span>';
    if (d <= -1) return '<span class="down">&#9660;' + d.toFixed(1) + 'pt</span>';
    return '<span class="flat">&#8594;' + (d>=0?"+":"") + d.toFixed(1) + 'pt</span>';
  }

  function renderRace(r){
    var h = '<div class="lrace"><div class="rh">'
      + '<span class="v">' + esc(VENUES[r.jcd] || r.jcd) + ' ' + esc(r.rno) + 'R</span>'
      + '<span class="dl">締切 ' + esc(r.deadline || "?") + '</span></div>';
    if (r.delta_comment) h += '<div class="comment">' + esc(r.delta_comment) + '</div>';
    h += '<table class="ltab"><tr><th>艇</th><th>朝の1着率</th><th>直前1着率</th><th>変化</th><th>展示タイム</th></tr>';
    var wp = r.win_prob || {}, mp = r.morning_win_prob || null, ex = r.exhibition || {};
    for (var l = 1; l <= 6; l++){
      var k = String(l), now = wp[k], morn = mp ? mp[k] : null;
      h += '<tr><td><span class="laneb" style="background:' + LANE_BG[l]
        + ';color:' + LANE_FG[l] + '">' + l + '</span></td>'
        + '<td>' + (morn != null ? pct(morn) : "-") + '</td>'
        + '<td><strong>' + (now != null ? pct(now) : "-") + '</strong></td>'
        + '<td>' + (now != null ? arrow(now, morn) : "-") + '</td>'
        + '<td>' + (ex[k] != null ? Number(ex[k]).toFixed(2) : "-") + '</td></tr>';
    }
    h += '</table>';
    var top = r.top10 || [];
    if (top.length){
      h += '<details class="tri" open><summary>3連単 上位10点</summary><div class="combos-live">';
      top.forEach(function(t, i){
        h += '<span>' + (i+1) + '. ' + esc(t.combo) + ' ' + pct(t.prob) + '</span>';
      });
      h += '</div></details>';
    }
    return h + '</div>';
  }

  function render(data){
    var root = document.getElementById("live-root");
    var races = (data && data.races) || [];
    document.getElementById("updated").textContent =
      data && data.updated ? "(最終更新 " + data.updated + ")" : "";
    if (!races.length){
      root.innerHTML = '<div class="empty">まだ本日の直前予測はありません。<br>'
        + '各レース締切の約10分前、展示航走の後に順次表示されます。</div>';
      return;
    }
    races = races.slice().sort(function(a,b){
      return String(a.deadline||"").localeCompare(String(b.deadline||""));
    });
    root.innerHTML = '<h2><span class="bar-accent"></span>本日の直前予測 ('
      + races.length + 'レース)</h2>' + races.map(renderRace).join("");
  }

  function load(){
    fetch("live/" + todayStr() + ".json?t=" + Date.now(), {cache:"no-store"})
      .then(function(res){ if(!res.ok) throw new Error(res.status); return res.json(); })
      .then(render)
      .catch(function(){
        document.getElementById("live-root").innerHTML =
          '<div class="empty">本日のライブデータはまだありません。<br>'
          + 'デーモン稼働日はレース締切約10分前から順次更新されます。</div>';
      });
  }
  load();
  setInterval(load, 30000);
})();
</script>
</body>
</html>
